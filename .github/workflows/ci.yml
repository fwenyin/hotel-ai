name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black==24.10.0 isort==5.13.2

      - name: Run Black
        run: black --check src/ tests/

      - name: Run isort
        run: isort --check-only --profile black src/ tests/

      - name: Run Flake8
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<78.0"
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create necessary directories
        run: |
          mkdir -p data/raw_data
          mkdir -p data/processed_data
          mkdir -p models
          mkdir -p mlruns

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing -m "not slow and not integration"

      - name: Run integration tests
        run: |
          pytest tests/ -v -m "integration and not slow"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true
